name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: [self-hosted, archglasses, optimized]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
      - name: Install release helpers
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev jq
      - name: Export release metadata
        id: release_meta
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          contract_version="$(jq -r .version snapshots/contract/overview.json)"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "contract_version=${contract_version}" >> "$GITHUB_OUTPUT"
      - name: Validate publish surface
        run: make publish-check
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push OCI image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.release_meta.outputs.image }}:${{ steps.release_meta.outputs.contract_version }}
            ${{ steps.release_meta.outputs.image }}:${{ github.ref_name }}
            ${{ steps.release_meta.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.release_meta.outputs.contract_version }}
            io.modelcontextprotocol.server.name=io.github.hairglasses-studio/dotfiles-mcp
          build-args: |
            VERSION=${{ steps.release_meta.outputs.contract_version }}
            COMMIT=${{ github.sha }}
      - name: Summarize contract diff
        run: |
          make contract-diff > .contract-diff.md
          cat .contract-diff.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload contract diff
        uses: actions/upload-artifact@v4
        with:
          name: contract-diff-${{ github.ref_name }}
          path: .contract-diff.md
          retention-days: 30
      - name: Run workstation host smoke
        run: make host-smoke
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Append contract diff to release body
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = context.ref.replace("refs/tags/", "");
            const diff = fs.readFileSync(".contract-diff.md", "utf8").trim();
            const marker = "## Contract Diff";
            const { data: release } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            let body = release.body || "";

            if (body.includes(marker)) {
              body = body.replace(/## Contract Diff[\s\S]*$/m, diff);
            } else {
              body = body.trim() ? `${body.trim()}\n\n${diff}\n` : `${diff}\n`;
            }

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              body,
            });
