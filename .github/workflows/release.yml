name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, archglasses, optimized]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
      - name: Install release helpers
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev jq
      - name: Validate publish surface
        run: make publish-check
      - name: Run workstation host smoke
        run: make host-smoke
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
