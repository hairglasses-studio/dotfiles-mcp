name: Validate Server Card

on:
  push:
    paths:
      - '.well-known/mcp.json'
      - 'snapshots/contract/**'
      - 'README.md'
      - 'ROADMAP.md'
      - 'CONTRIBUTING.md'
      - 'Makefile'
      - 'scripts/release-parity.sh'
  pull_request:
    paths:
      - '.well-known/mcp.json'
      - 'snapshots/contract/**'
      - 'README.md'
      - 'ROADMAP.md'
      - 'CONTRIBUTING.md'
      - 'Makefile'
      - 'scripts/release-parity.sh'
  workflow_dispatch:

jobs:
  validate-publish-surface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Validate mirror publish surface
        run: make publish-check
