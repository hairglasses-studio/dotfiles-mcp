name: Publish Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  publish-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run publish surface checks
        run: make publish-check
      - name: Summarize contract diff
        run: |
          make contract-diff > .contract-diff.md
          cat .contract-diff.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload contract diff
        uses: actions/upload-artifact@v4
        with:
          name: contract-diff-${{ github.sha }}
          path: .contract-diff.md
          retention-days: 14

  host-smoke:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: [self-hosted, archglasses, optimized]
    steps:
      - uses: actions/checkout@v4
      - name: Run workstation host smoke
        run: make host-smoke
